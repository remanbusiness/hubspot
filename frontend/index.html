<!DOCTYPE html>
<html>
<head>
  <title>HubSpot Dashboard</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
    <h2 class="text-center mb-4">HubSpot Dashboard</h2>

    <!-- TOKEN INPUT -->
    <div class="mb-3 w-80">
      <label class="form-label">Access Token</label>
      <input type="text" id="token" class="form-control" placeholder="Enter your access token">
    </div>

    <!-- BUTTONS -->
    <div class="d-flex gap-3 mb-4 justify-content-center">
      <button class="btn btn-primary w-20 action-btn" onclick="getContactFields()">
        Contact Fields
      </button>

      <button class="btn btn-success w-20 action-btn" onclick="getCompanyFields()">
        Company Fields
      </button>
    </div>

    <!-- RESPONSE -->
     <div id="response" class="d-none">
       <h5>Response:</h5>
       <div id="output" class="border p-3 bg-white rounded" style="white-space: pre-wrap; max-height: 300px; overflow-y: auto;"></div>
     </div>

  </div>
  <!-- MODAL -->
  <div class="modal fade" id="fieldsModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Create Contact</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <!-- COMMON FIELDS -->
          <h6>Common Fields</h6>
          <div id="commonFieldsContainer" class="row g-3"></div>

          <hr>

          <!-- TOGGLE OTHER -->
          <button id="toggleOtherBtn" class="btn btn-sm btn-outline-secondary mb-2" onclick="toggleOtherFields()">
            Show Other Fields
          </button>

          <div id="otherFieldsContainer" class="d-none row g-3"></div>
          <div id="createContactResponse" class="d-none mt-2"></div>
          

        </div>

        <div class="modal-footer">
          <button id="submitBtn" class="btn btn-success" onclick="handleSubmit()">Create Contact</button>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
